upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 60
memory_limit = 256M
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /proc/self/fd/2           ; Log to stderr → docker logs
date.timezone = Asia/Ho_Chi_Minh
expose_php = Off
