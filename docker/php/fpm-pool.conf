; ─── PHP-FPM Pool Configuration ────────────────────────────────────────────────
; File này override một số settings của pool [www] mặc định
; Được load SAU www.conf (nhờ tiền tố zzz-) → override an toàn

[www]

; ── FPM Healthcheck endpoints ─────────────────────────────────────────────────
; Bật ping endpoint để healthcheck.sh có thể check qua FastCGI protocol
; Chính xác hơn pgrep vì check actual request handling, không chỉ process existence
;
; Cách hoạt động:
;   healthcheck.sh gửi FastCGI request đến 127.0.0.1:9000/fpm-ping
;   FPM nhận request → workers còn sống và nhận được request → trả về "pong"
;   Nếu workers deadlock hoặc queue full → timeout → healthcheck fail
;
; Lưu ý: ping.path phải bắt đầu bằng / và không được trùng với route ứng dụng
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; ── Process Manager: dynamic ──────────────────────────────────────────────────
; dynamic: FPM tự điều chỉnh số workers theo load (tốt nhất cho đa số use case)
; static: số workers cố định (tốt khi traffic đều, muốn predictable memory)
; ondemand: spawn worker khi có request, idle thì tắt (tốt cho low-traffic/RAM ít)
;
; Comparison:
;   dynamic: balanced, khởi động nhanh, không waste RAM khi idle
;   static pm.max_children=10: luôn có 10 workers, response nhanh nhất
;   ondemand: RAM thấp nhất nhưng cold start khi idle
pm = dynamic

; Số workers tối đa (tính theo: RAM_available / 30MB per worker)
; t3.small (2GB RAM): 2048MB - 512MB OS - 512MB MySQL - 256MB Redis = ~768MB → ~25 workers
; Nhưng nên để margin: 10-15 workers
pm.max_children = 10

; Workers start ngay khi FPM start (giảm cold start cho request đầu tiên)
pm.start_servers = 2

; Giữ tối thiểu workers này kể cả khi idle
pm.min_spare_servers = 1

; Tạo thêm workers nếu spare workers < giá trị này
pm.max_spare_servers = 3

; Restart worker sau N requests (tránh memory leak tích lũy)
pm.max_requests = 500

; ── Logging ──────────────────────────────────────────────────────────────────
; Log slow requests (chạy lâu hơn X giây) → debug performance issues
; 0 = tắt, -1 = log tất cả
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s

; ── Error handling ────────────────────────────────────────────────────────────
; Log PHP errors ra stderr → docker logs sẽ capture được
catch_workers_output = yes
decorate_workers_output = no
