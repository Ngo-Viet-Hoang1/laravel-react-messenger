opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0           ; Không check lại (code không đổi trong prod)
opcache.validate_timestamps = 0       ; Bỏ qua timestamp check
opcache.save_comments = 1             ; Cần cho Doctrine annotations
opcache.fast_shutdown = 1
opcache.jit_buffer_size = 64M
opcache.jit = 1235                    ; PHP 8.x JIT (function JIT)
