# Override toàn bộ nginx.conf để thêm rate limit zones vào http block
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;            # Ẩn nginx version

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ─── Rate limit zones ────────────────────────────────────────
    # Zone cho login/register: giới hạn brute force
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=10r/m;
    # Zone cho API: 120 req/min per IP
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=120r/m;
    # Zone cho WebSocket (Reverb)
    limit_req_zone  $binary_remote_addr zone=ws:10m      rate=30r/m;
    # Concurrent connections
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    include /etc/nginx/conf.d/*.conf;
}
