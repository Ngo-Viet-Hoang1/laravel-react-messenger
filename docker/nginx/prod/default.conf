server {
    listen 80;
    server_name _;                  # Thay bằng domain thật: server_name yourdomain.com;
    root /var/www/public;          # Laravel public folder
    index index.php;
    charset utf-8;
    client_max_body_size 40M;

    # Concurrent connection limit (định nghĩa trong nginx.conf)
    limit_conn perip 20;

    # ─── Reverb WebSocket (CRITICAL) ──────────────────────────────────────────
    # Laravel Reverb dùng Pusher protocol, expose qua path /app/ và /apps/
    # HTTP Upgrade header phải được forward để WebSocket handshake thành công
    # Không có block này → browser nhận 426 Upgrade Required → real-time broken
    location /app/ {
        proxy_pass         http://reverb:8080;   # service name trong Docker network
        proxy_http_version 1.1;                  # HTTP/1.1 bắt buộc cho WebSocket
        proxy_set_header   Upgrade    $http_upgrade;    # forward WS upgrade header
        proxy_set_header   Connection "upgrade";        # báo connection là upgrade
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;   # WS connections thường idle → cần timeout đủ dài
        proxy_send_timeout 60s;
    }

    # Reverb HTTP API (presence auth, channel stats endpoint)
    location /apps/ {
        proxy_pass       http://reverb:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Auth routes: rate limit nghiêm ngặt ─────────────────────────────────
    location ~ ^/(login|register|password|forgot-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass   app:9000;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ─── API routes ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass   app:9000;
            fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ─── Static assets: cache dài, serve trực tiếp ────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ─── General routes ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass             app:9000;
        fastcgi_param            SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                  fastcgi_params;
        fastcgi_read_timeout     60;
        fastcgi_hide_header      X-Powered-By;
        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        # Nếu dùng HTTPS, thêm:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location ~ /\.(?!well-known).* { deny all; }
    error_page 404 /index.php;
}

# ─── HTTPS server (uncomment sau khi có SSL cert từ Certbot) ──────────────────
# Certbot sẽ tự động thêm block này khi chạy: certbot --nginx -d yourdomain.com
